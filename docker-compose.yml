services:

  db:
    container_name: film-db
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: filmuser
      POSTGRES_PASSWORD: filmpass
      POSTGRES_DB: filmdb
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U filmuser -d filmdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    container_name: film-backend
    build: ./backend
    ports:
      - "8001:8001"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  frontend:
    container_name: film-frontend
    build: ./frontend
    ports:
      - "5174:5174"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8001

volumes:
  pgdata:
